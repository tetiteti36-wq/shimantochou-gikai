name: LINE通知

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: LINEに通知を送る
        env:
          TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          CLEAN_USER_ID=$(echo -n "$USER_ID" | tr -d '\n\r ')
          CLEAN_TOKEN=$(echo -n "$TOKEN" | tr -d '\n\r ')
          jq -n --arg to "$CLEAN_USER_ID" '{"to": $to, "messages": [{"type": "text", "text": "議会ナビサイトを更新しました"}]}' > /tmp/payload.json
          curl -X POST https://api.line.me/v2/bot/message/push \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $CLEAN_TOKEN" \
            -d @/tmp/payload.json
