name: LINE通知

on:
  push:
    branches:
      - main

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: LINEに通知を送る
        env:
          TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          USER_ID: ${{ secrets.LINE_USER_ID }}
        run: |
          python3 << 'EOF'
          import urllib.request, json, os
          token = os.environ['TOKEN']
          user_id = os.environ['USER_ID']
          data = json.dumps({"to": user_id, "messages": [{"type": "text", "text": "四万十町議会ナビサイトを更新しました！"}]}).encode('utf-8')
          req = urllib.request.Request('https://api.line.me/v2/bot/message/push', data=data, headers={'Content-Type': 'application/json', 'Authorization': f'Bearer {token}'})
          print(urllib.request.urlopen(req).read())
          EOF
